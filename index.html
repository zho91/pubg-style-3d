<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绝地求生风格 3D 战场</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: "Microsoft YaHei", sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white; pointer-events: none;
            text-shadow: 0 0 5px black;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; font-size: 30px;
            color: rgba(255,255,255,0.8); transform: translate(-50%, -50%);
            pointer-events: none; user-select: none;
        }
        #instructions {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 8px; color: white;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2>绝地求生风格 Demo</h2>
        <p>WASD 移动 | 鼠标看向 | 左键射击 | 空格跳跃</p>
    </div>
    <div id="crosshair">+</div>
    <div id="instructions">点击屏幕锁定鼠标 → 开始游戏</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let move = { forward: false, backward: false, left: false, right: false, jump: false };
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let canJump = true;
        let bullets = [];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x88ccff, 100, 800);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 天空光 + 阳光（PUBG风格）
            const hemiLight = new THREE.HemisphereLight(0x88ccff, 0x77aa66, 0.6);
            scene.add(hemiLight);
            const dirLight = new THREE.DirectionalLight(0xffddaa, 1);
            dirLight.position.set(50, 100, 30);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // 大地形（草地）
            const groundGeo = new THREE.PlaneGeometry(500, 500);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x3a8c3a });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // 一些障碍物（房子/箱子模拟）
            createBox(10, 8, 15, 0, 4, -30);
            createBox(20, 6, 10, 40, 3, -50);
            createBox(8, 12, 8, -35, 6, 20);

            // 事件监听
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('click', () => renderer.domElement.requestPointerLock());

            document.addEventListener('pointerlockchange', () => {
                document.getElementById('instructions').style.display = 
                    document.pointerLockElement ? 'none' : 'block';
            });
        }

        function createBox(w, h, d, x, y, z) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshLambertMaterial({ color: 0x8b5a2b });
            const box = new THREE.Mesh(geo, mat);
            box.position.set(x, y, z);
            box.castShadow = true;
            box.receiveShadow = true;
            scene.add(box);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onKeyDown(e) {
            switch(e.code) {
                case 'KeyW': move.forward = true; break;
                case 'KeyS': move.backward = true; break;
                case 'KeyA': move.left = true; break;
                case 'KeyD': move.right = true; break;
                case 'Space': if(canJump) velocity.y += 12; canJump = false; break;
            }
        }

        function onKeyUp(e) {
            switch(e.code) {
                case 'KeyW': move.forward = false; break;
                case 'KeyS': move.backward = false; break;
                case 'KeyA': move.left = false; break;
                case 'KeyD': move.right = false; break;
            }
        }

        function onMouseDown(e) {
            if (e.button === 0 && document.pointerLockElement) {
                shoot();
            }
        }

        function shoot() {
            const bulletGeo = new THREE.SphereGeometry(0.3, 8, 8);
            const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            
            bullet.position.copy(camera.position);
            const shootDir = new THREE.Vector3();
            camera.getWorldDirection(shootDir);
            bullet.velocity = shootDir.multiplyScalar(80);
            
            scene.add(bullet);
            bullets.push(bullet);
            
            // 枪口闪光效果（简单）
            setTimeout(() => scene.remove(bullet), 2000);
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = 0.05;

            // 移动逻辑
            direction.z = Number(move.forward) - Number(move.backward);
            direction.x = Number(move.right) - Number(move.left);
            direction.normalize();

            if (move.forward || move.backward) velocity.z = direction.z * 25 * delta;
            else velocity.z *= 0.8;

            if (move.left || move.right) velocity.x = direction.x * 25 * delta;
            else velocity.x *= 0.8;

            camera.translateX(velocity.x);
            camera.translateZ(velocity.z);

            // 重力 & 跳跃
            velocity.y -= 30 * delta;
            camera.position.y += velocity.y * delta;

            if (camera.position.y < 5) {
                velocity.y = 0;
                camera.position.y = 5;
                canJump = true;
            }

            // 更新子弹
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.add(b.velocity.clone().multiplyScalar(delta));
                if (b.position.length() > 300) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
